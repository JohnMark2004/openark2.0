<section id="browseSection" class="hidden">
  <h2 id="browseHeading">Browse Library</h2>

  <div class="browse-controls">
    <input type="text" id="browseSearch" placeholder="Search..." />
    <button id="browseSearchBtn">Search</button>
    <button id="advancedSearchToggle">Advanced Search</button>
  </div>

  <div id="advancedSearchSection" class="hidden">
    <input type="text" id="keywordSearch" placeholder="Keyword (Description)">
    <input type="text" id="authorSearch" placeholder="Author Name">

    <div class="genre-filters" id="genreFilters">
      <button class="genre-btn active" data-genre="all">All</button>
      <button class="genre-btn" data-genre="Accountancy">Accountancy</button>
      <button class="genre-btn" data-genre="Criminology">Criminology</button>
      <button class="genre-btn" data-genre="Computer Science">Computer Science</button>
      <button class="genre-btn" data-genre="Engineering">Engineering</button>
      <button class="genre-btn" data-genre="Commerce">Commerce</button>
      <button class="genre-btn" data-genre="Maritime">Maritime</button>
      <button class="genre-btn" data-genre="Mass Communication">Mass Communication</button>
      <button class="genre-btn" data-genre="Political Science">Political Science</button>
      <button class="genre-btn" data-genre="Psychology">Psychology</button>
      <button class="genre-btn" data-genre="Aviation">Aviation</button>
      <button class="genre-btn" data-genre="Fiction">Fiction</button>
      <button class="genre-btn" data-genre="Filipiana">Filipiana</button>
      <button class="genre-btn" data-genre="General Education">General Education</button>
      <button class="genre-btn" data-genre="Senior High">Senior High</button>
    </div>
  </div>

  <h3 id="currentGenreTitle">Showing: All</h3>
  <div id="loadingSpinnerBrowse" class="spinner hidden"></div>
  <div class="browse-grid" id="browseBooks"></div>
</section>
