<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book Loading Animation</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #fdfdfd;
    }

    .book {
      position: relative;
      width: 80px;
      height: 60px;
      perspective: 600px;
    }

    .page {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #fff;
      border: 2px solid #333;
      border-radius: 4px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      transform-origin: left center;
      animation: flip 1.2s ease-in-out infinite;
    }

    .page:nth-child(2) { animation-delay: 0.2s; }
    .page:nth-child(3) { animation-delay: 0.4s; }
    .page:nth-child(4) { animation-delay: 0.6s; }

    @keyframes flip {
      0%   { transform: rotateY(0deg); }
      50%  { transform: rotateY(-180deg); }
      100% { transform: rotateY(-180deg); }
    }
  </style>
</head>
<body>
  <div class="book">
    <div class="page"></div>
    <div class="page"></div>
    <div class="page"></div>
    <div class="page"></div>
  </div>
</body>
</html>
